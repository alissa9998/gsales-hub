<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GlobalSales Hub · 海外客户与订单管理</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #f4f6fb; --surface: #ffffff; --border: #e2e6f0; --text: #1a1f36;
            --text-secondary: #5a6072; --text-muted: #8b90a0; --accent: #3b5fe5;
            --accent-light: #eef1ff; --danger: #e43b3b; --warning: #f08c2e;
            --success: #17a86b; --info: #3b82f6; --purple: #7c3aed;
            --radius: 16px; --radius-sm: 10px; --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow: 0 6px 20px rgba(0,0,0,0.06); --transition: 0.2s;
            --font: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;}
        .topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,0.03);}
        .logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
        .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#3b5fe5,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;}
        .logo-text{font-weight:700;font-size:17px;color:var(--text);}
        .nav-links{display:flex;gap:4px;}
        .nav-links a{padding:8px 16px;border-radius:28px;font-size:13px;font-weight:500;color:var(--text-secondary);text-decoration:none;transition:var(--transition);cursor:pointer;}
        .nav-links a:hover,.nav-links a.active{background:var(--accent-light);color:var(--accent);font-weight:600;}
        .btn{padding:7px 14px;border-radius:22px;font-size:12px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:var(--transition);background:var(--surface);border:1px solid var(--border);color:var(--text-secondary);white-space:nowrap;font-family:var(--font);}
        .btn-primary{background:var(--accent);color:#fff;border:none;box-shadow:0 2px 8px rgba(59,95,229,0.25);}
        .btn-primary:hover{background:#2c4bc4;}
        .btn:hover{background:#f0f2f7;}
        .btn-danger{color:var(--danger);border-color:#fecaca;}
        .btn-danger:hover{background:#fef2f2;}
        .main-content{max-width:1440px;margin:0 auto;padding:20px 20px 40px;}
        .section{margin-bottom:28px;scroll-margin-top:78px;}
        .section-title{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:16px;}
        .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:20px;}
        .stat-card{background:var(--surface);border-radius:var(--radius);padding:16px 18px;border:1px solid var(--border);box-shadow:var(--shadow-sm);cursor:pointer;transition:var(--transition);}
        .stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
        .stat-card .value{font-size:24px;font-weight:700;margin:4px 0;letter-spacing:-0.5px;}
        .stat-card .label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;}
        .card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden;}
        .card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;font-weight:600;font-size:13px;}
        .card-body{padding:14px 18px;overflow-x:auto;}
        table{width:100%;border-collapse:collapse;font-size:12px;min-width:1300px;}
        th{text-align:left;padding:11px 8px;font-weight:600;color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.4px;background:#fafbfc;border-bottom:2px solid var(--border);white-space:nowrap;}
        td{padding:10px 8px;border-bottom:1px solid #f0f2f6;vertical-align:middle;}
        tr:hover td{background:#f8faff;}
        .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:16px;font-size:10px;font-weight:600;white-space:nowrap;}
        .filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px;padding:10px 14px;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);}
        .filter-bar select,.filter-bar input{padding:7px 10px;border:1px solid var(--border);border-radius:18px;font-size:12px;background:#fff;font-family:var(--font);}
        .autocomplete-wrapper{position:relative;display:inline-block;}
        .autocomplete-wrapper input{padding:7px 28px 7px 10px;}
        .autocomplete-list{position:absolute;top:100%;left:0;right:0;max-height:180px;overflow-y:auto;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 28px rgba(0,0,0,0.12);z-index:70;display:none;margin-top:3px;}
        .autocomplete-list.active{display:block;}
        .autocomplete-item{padding:7px 10px;cursor:pointer;font-size:12px;}
        .autocomplete-item:hover{background:#f0f4ff;}
        .custom-select{position:relative;display:inline-block;min-width:170px;}
        .custom-select input{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:18px;font-size:12px;font-family:var(--font);}
        .custom-select .options{position:absolute;top:100%;left:0;right:0;max-height:220px;overflow-y:auto;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 28px rgba(0,0,0,0.12);z-index:60;display:none;margin-top:3px;}
        .custom-select .options.active{display:block;}
        .custom-select .option{padding:7px 10px;display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;}
        .custom-select .option:hover{background:#f0f4ff;}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.25);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:0.2s;}
        .modal-overlay.active{opacity:1;pointer-events:auto;}
        .modal{background:#fff;border-radius:var(--radius);padding:22px;width:92%;max-width:850px;box-shadow:0 20px 48px rgba(0,0,0,0.18);max-height:88vh;overflow-y:auto;position:relative;}
        .modal h3{font-size:17px;font-weight:700;margin-bottom:16px;}
        .form-group{margin-bottom:12px;}
        .form-group label{font-size:11px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:3px;}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:10px;font-size:12px;background:#fafbfc;font-family:var(--font);}
        .form-row{display:flex;gap:10px;flex-wrap:wrap;}
        .form-row .form-group{flex:1;min-width:120px;}
        .help-text{font-size:10px;color:var(--text-muted);margin-top:3px;line-height:1.4;}
        .toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:11px 18px;border-radius:26px;font-size:13px;z-index:9999;opacity:0;transform:translateY(16px);transition:0.3s;pointer-events:none;}
        .toast.show{opacity:1;transform:translateY(0);}
        .multi-search-input{padding:10px 14px!important;border:2px solid var(--border)!important;border-radius:25px!important;font-size:13px!important;background:#f8fafd!important;box-shadow:inset 0 1px 3px rgba(0,0,0,0.04)!important;}
        .customer-check-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;max-height:280px;overflow-y:auto;padding:4px 0;}
        .customer-check-grid label{font-size:12px;display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:var(--transition);}
        .customer-check-grid label:hover{background:#f0f4ff;}
        input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
        input[type="number"]{-moz-appearance:textfield;}
        @media(max-width:768px){.topbar{padding:0 10px;height:52px;}.nav-links a{padding:5px 8px;font-size:11px;}.stats-grid{grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;}}
    </style>
</head>
<body>
<header class="topbar" id="topbar">
    <div class="logo" onclick="document.getElementById('dashboard').scrollIntoView({behavior:'smooth'})">
        <div class="logo-icon">GS</div><span class="logo-text">GlobalSales Hub</span>
    </div>
    <nav class="nav-links" id="navLinks">
        <a href="#dashboard" data-section="dashboard" class="active">📊 仪表盘</a>
        <a href="#customers" data-section="customers">👥 客户管理</a>
        <a href="#orders" data-section="orders">📦 订单跟进</a>
    </nav>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn" onclick="downloadCustomerTemplate()">📥 客户模板</button>
        <button class="btn" onclick="triggerCustomerImport()">📤 导入客户</button>
        <button class="btn btn-primary" onclick="openCustomerModal()">➕ 添加客户</button>
        <button class="btn" onclick="downloadOrderTemplate()">📥 订单模板</button>
        <button class="btn" onclick="triggerOrderImport()">📤 导入订单</button>
        <button class="btn btn-primary" onclick="openOrderModal()">➕ 添加订单</button>
        <button class="btn" onclick="exportToExcel()">📊 导出Excel</button>
        <button class="btn" onclick="exportToPDF()">📄 导出PDF</button>
    </div>
</header>
<input type="file" id="customerImportFile" accept=".xlsx,.xls" hidden onchange="handleCustomerImport(event)">
<input type="file" id="orderImportFile" accept=".xlsx,.xls" hidden onchange="handleOrderImport(event)">

<main class="main-content">
    <section id="dashboard" class="section">
        <div class="section-title"><span class="dot"></span>销售仪表盘 · 实时联动</div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="filter-bar" id="dashboardFilter">
            <input type="date" id="dashDateFrom" title="开始日期"> <span>至</span> <input type="date" id="dashDateTo" title="结束日期">
            <select id="dashProduct"><option value="">全部产品</option></select>
            <div class="autocomplete-wrapper" id="dashCustomerWrapper">
                <input type="text" id="dashCustomer" placeholder="客户姓名" autocomplete="off" onkeydown="if(event.key==='Enter')applyDashboardFilter()">
                <div class="autocomplete-list" id="dashCustomerList"></div>
            </div>
            <button class="btn" onclick="openCustomerMultiSelect('dash')" title="多选客户">☰</button>
            <select id="dashCountry"><option value="">全部国家</option></select>
            <button class="btn btn-primary" onclick="applyDashboardFilter()">筛选</button>
            <button class="btn" onclick="resetDashboardFilters()">重置</button>
        </div>
        <div id="dashboardResult" style="margin-top:12px;display:none;"></div>
    </section>

    <section id="customers" class="section">
        <div class="section-title"><span class="dot"></span>客户管理 · 信息全览</div>
        <div class="card">
            <div class="card-header"><strong>👥 客户列表</strong><span id="customerCount">0</span></div>
            <div class="card-body">
                <div class="filter-bar">
                    <div class="autocomplete-wrapper" id="custNameWrapper">
                        <input type="text" id="filterCustomerName" placeholder="🔍 客户姓名（回车搜索）" autocomplete="off" onkeydown="if(event.key==='Enter')searchCustomers()">
                        <div class="autocomplete-list" id="custNameList"></div>
                    </div>
                    <button class="btn btn-primary" onclick="searchCustomers()">搜索</button>
                    <button class="btn" onclick="openCustomerMultiSelect('cust')" title="多选客户">☰</button>
                    <select id="filterCountry"><option value="">🌍 全部国家</option></select>
                    <select id="filterStatus"><option value="">📌 全部状态</option><option>询盘</option><option>议价</option><option>已下单</option><option>已交付</option></select>
                    <select id="filterProduct"><option value="">📦 全部产品</option></select>
                    <input type="date" id="filterDateFrom" title="开发时间从"> <span style="font-size:11px;">至</span> <input type="date" id="filterDateTo" title="开发时间至">
                    <button class="btn" onclick="resetCustomerFilters()">重置</button>
                </div>
                <table id="customerTable">
                    <thead><tr><th>客户姓名</th><th>国家</th><th>产品</th><th>意向</th><th>状态</th><th>开发时间</th><th>开发渠道</th><th>联系人</th><th>邮箱</th><th>电话</th><th>联系软件</th><th>付款习惯</th><th>备注</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </section>

    <section id="orders" class="section">
        <div class="section-title"><span class="dot"></span>订单跟进 · 明细联动分批</div>
        <div class="card">
            <div class="card-header"><strong>📦 订单列表</strong><span id="orderCount">0</span></div>
            <div class="card-body">
                <div class="filter-bar">
                    <div class="autocomplete-wrapper" id="orderCustWrapper">
                        <input type="text" id="filterOrderCustomer" placeholder="🔍 客户姓名（回车搜索）" autocomplete="off" onkeydown="if(event.key==='Enter')searchOrders()">
                        <div class="autocomplete-list" id="orderCustList"></div>
                    </div>
                    <button class="btn btn-primary" onclick="searchOrders()">搜索</button>
                    <button class="btn" onclick="openCustomerMultiSelect('order')" title="多选客户">☰</button>
                    <select id="filterOrderCountry"><option value="">🌍 全部国家</option></select>
                    <select id="filterOrderProduct"><option value="">📦 全部产品</option></select>
                    <select id="filterOrderStatus"><option value="">📌 全部状态</option><option>已收定金待生产</option><option>已生产待交付</option><option>已交付待抵达</option><option>已抵达完成</option></select>
                    <input type="date" id="filterOrderDateFrom" title="下单日期从"> <span style="font-size:11px;">至</span> <input type="date" id="filterOrderDateTo" title="下单日期至">
                    <button class="btn" onclick="resetOrderFilters()">重置</button>
                </div>
                <table id="orderTable">
                    <thead><tr><th>订单编号</th><th>客户</th><th>国家</th><th>产品明细</th><th>总金额</th><th>币种</th><th>付款状态</th><th>剩余应收尾款</th><th>生产状态</th><th>下单日期</th><th>交付日</th><th>备注</th><th>分批</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent" onclick="event.stopPropagation()"></div></div>
<div class="toast" id="toast"></div>

<script>

  function loadCustomData() {

      const p = localStorage.getItem(CUSTOM_PRODUCTS_KEY);

  function getCurrencySymbol(code){ const c = currencies.find(x=>x.code===code); return c ? c.symbol : code; }

  function getPaymentStatus(order) {
    const today = new Date(); today.setHours(0,0,0,0);
    if (order.paymentType === 'full') {
      if (!order.fullPaymentDate) return { text: '全款未付款', color: '#e43b3b' };
      const d = new Date(order.fullPaymentDate); d.setHours(0,0,0,0);
      return d <= today ? { text: '全款已付款', color: '#17a86b' } : { text: '全款未付款', color: '#e43b3b' };
    } else {
      const adv = order.advancePaymentDate ? new Date(order.advancePaymentDate) : null;
      const bal = order.balancePaymentDate ? new Date(order.balancePaymentDate) : null;
      if (adv) adv.setHours(0,0,0,0);
      if (bal) bal.setHours(0,0,0,0);
      const advPaid = adv && adv <= today;
      const balPaid = bal && bal <= today;
      if (advPaid && balPaid) return { text: '预付款已付，尾款已付', color: '#17a86b' };
      if (advPaid && !balPaid) return { text: '预付款已付，尾款未付', color: '#f08c2e' };
      if (!advPaid && balPaid) return { text: '预付款未付，尾款已付', color: '#e43b3b' };
      return { text: '预付款未付，尾款未付', color: '#e43b3b' };
    }
  }

  function getRemainingBalanceDisplay(order) {
    if (order.paymentType === 'full') return '-';
    const today = new Date(); today.setHours(0,0,0,0);
    const totalBalance = order.balanceAmount || 0;
    let receivedBalance = 0;
    if (order.batches && order.batches.length > 0) {
      order.batches.forEach(b => {
        if (b.balancePaymentDate) {
          const d = new Date(b.balancePaymentDate); d.setHours(0,0,0,0);
          if (d <= today) receivedBalance += (b.batchBalanceAmount || 0);
        }
      });
    }
    const remaining = totalBalance - receivedBalance;
    const sym = getCurrencySymbol(order.currency);
    return sym + remaining.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  function getMixedCurrencyDisplay(ordersList) {
    const map = new Map();
    ordersList.forEach(o => { map.set(o.currency, (map.get(o.currency)||0) + o.totalAmount); });
    if (map.size === 1) {
      const [code, amount] = [...map.entries()][0];
      const sym = getCurrencySymbol(code);
      return sym + amount.toLocaleString();
    } else {
      return [...map.entries()].map(([code, amount]) => { const sym = getCurrencySymbol(code); return sym + amount.toLocaleString(); }).join(' + ');
    }
  }

  window.addBatch = () => {

    if(!alloc){ alloc = {itemIndex:ii, quantity:0}; tempBatches[bi].allocations.push(alloc); }
    alloc.quantity = Math.max(0, val);
    const totalAmount = tempItems.reduce((s,i)=>s+(i.amount||0),0);

  function renderBatches(){

    const incotermVal = document.getElementById('ordIncoterm')?.value;
    const customIncoterm = document.getElementById('ordCustomIncoterm')?.value.trim();
    const finalIncoterm = incotermVal === '其他' ? (customIncoterm || '其他') : incotermVal;
    if (finalIncoterm && !incotermsList.includes(finalIncoterm) && !globalCustomIncoterms.includes(finalIncoterm)) {
      globalCustomIncoterms.push(finalIncoterm);
    }
    const payMethodVal = document.getElementById('ordPayMethod')?.value;
    const customPayMethod = document.getElementById('ordCustomPayMethod')?.value.trim();
    const finalPayMethod = payMethodVal === '其他' ? (customPayMethod || '其他') : payMethodVal;
    if (finalPayMethod && !paymentMethodsList.includes(finalPayMethod) && !globalCustomPaymentMethods.includes(finalPayMethod)) {
      globalCustomPaymentMethods.push(finalPayMethod);
    }
    const data = {
      customerId:custId, customerName:customer?.name||'', country:customer?.country||'',
      items: JSON.parse(JSON.stringify(tempItems)), totalAmount: total,
      currency: document.getElementById('ordCurrency')?.value,
      incoterm: finalIncoterm,
      paymentMethod: finalPayMethod,
      paymentType,
      depositPercent: paymentType==='advance'? parseFloat(document.getElementById('ordDepPct')?.value)||0 : 0,
      balancePercent: paymentType==='advance'? parseFloat(document.getElementById('ordBalPct')?.value)||0 : 0,
      depositAmount: paymentType==='advance'? total*(parseFloat(document.getElementById('ordDepPct')?.value)||0)/100 : 0,
      balanceAmount: paymentType==='advance'? total*(parseFloat(document.getElementById('ordBalPct')?.value)||0)/100 : 0,
      fullPaymentDate: paymentType==='full'? document.getElementById('ordFullDate')?.value : '',
      advancePaymentDate: paymentType==='advance'? document.getElementById('ordAdvDate')?.value : '',
      balancePaymentDate: paymentType==='advance'? document.getElementById('ordBalDate')?.value : '',
      status: document.getElementById('ordStatus')?.value,
      orderDate: document.getElementById('ordOrderDate')?.value || new Date().toISOString().slice(0,10),
      deliveryDate: document.getElementById('ordDelivery')?.value,
      notes: document.getElementById('ordNotes')?.value,
      batches: JSON.parse(JSON.stringify(tempBatches))
    };
    if(editId){ const idx=orders.findIndex(o=>o.id===editId); if(idx!==-1){ orders[idx]={...orders[idx],...data}; syncCustomerFromOrder(orders[idx]); } }
    else{ orders.push({id:nextOid++,...data}); syncCustomerFromOrder(orders[orders.length-1]); }
    saveCustomData();
    closeModal(); refreshAll(); showToast('订单已保存');
  };
  window.deleteOrder = (id) => { orders=orders.filter(o=>o.id!==id); refreshAll(); };

  window.downloadCustomerTemplate = () => { const ws=XLSX.utils.aoa_to_sheet([['姓名','国家','产品','意向','状态','开发时间','渠道','联系人','邮箱','电话','软件','账号','付款习惯','备注']]); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'客户模板'); XLSX.writeFile(wb,'客户模板.xlsx'); showToast('模板已下载'); };
  window.downloadOrderTemplate = () => { const ws=XLSX.utils.aoa_to_sheet([['客户姓名','国家','产品明细','总金额','币种','付款方式','贸易条款','状态','交付日','下单时间','备注']]); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'订单模板'); XLSX.writeFile(wb,'订单模板.xlsx'); showToast('模板已下载'); };
  window.triggerCustomerImport = () => document.getElementById('customerImportFile').click();
  window.triggerOrderImport = () => document.getElementById('orderImportFile').click();
  window.handleCustomerImport = (e) => { const file=e.target.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=(ev)=>{ try{ const wb=XLSX.read(ev.target.result,{type:'array'}); const ws=wb.Sheets[wb.SheetNames[0]]; const rows=XLSX.utils.sheet_to_json(ws,{header:1}); rows.slice(1).forEach(r=>{if(r[0]) customers.push({id:nextCid++,name:r[0],country:r[1]||'',product:r[2]||'',priority:r[3]||'',status:r[4]||'询盘',developedDate:r[5]||'',source:r[6]||'',contactPerson:r[7]||'',email:r[8]||'',phone:r[9]||'',app:r[10]||'',appId:r[11]||'',paymentHabit:r[12]||'',notes:r[13]||''});}); refreshAll(); showToast('客户导入成功'); }catch(e){showToast('导入失败');} }; reader.readAsArrayBuffer(file); };
  window.handleOrderImport = (e) => { const file=e.target.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=(ev)=>{ try{ const wb=XLSX.read(ev.target.result,{type:'array'}); const ws=wb.Sheets[wb.SheetNames[0]]; const rows=XLSX.utils.sheet_to_json(ws,{header:1}); rows.slice(1).forEach(r=>{if(r[0]){ const cust=customers.find(c=>c.name===r[0]); orders.push({id:nextOid++,customerId:cust?.id||0,customerName:r[0],country:cust?.country||'',items:[],totalAmount:parseFloat(r[3])||0,currency:r[4]||'USD',incoterm:r[6]||'',paymentMethod:r[5]||'',paymentType:'advance',depositPercent:30,balancePercent:70,depositAmount:0,balanceAmount:0,advancePaymentDate:'',balancePaymentDate:'',status:r[7]||'已收定金待生产',orderDate:r[9]||new Date().toISOString().slice(0,10),deliveryDate:r[8]||'',notes:r[10]||'',batches:[]}); }}); refreshAll(); showToast('订单导入成功'); }catch(e){showToast('导入失败');} }; reader.readAsArrayBuffer(file); };
  window.exportToExcel = () => { const cust=customers.map(c=>({姓名:c.name,国家:c.country,产品:c.product,意向:c.priority,状态:c.status,时间:c.developedDate,渠道:c.source,联系人:c.contactPerson,邮箱:c.email,电话:c.phone,软件:c.app,账号:c.appId,付款习惯:c.paymentHabit,备注:c.notes})); const ord=orders.map(o=>({编号:'ORD-'+String(o.id).padStart(4,'0'),客户:o.customerName,国家:o.country,总金额:o.totalAmount,币种:o.currency,付款状态:getPaymentStatus(o).text,状态:o.status,交付日:o.deliveryDate,下单时间:o.orderDate,备注:o.notes})); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(cust),'客户'); XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ord),'订单'); XLSX.writeFile(wb,'销售数据导出.xlsx'); showToast('Excel导出成功'); };
  window.exportToPDF = () => { window.print(); showToast('请选择另存为PDF'); };

  function initCountrySelect(container, selected) {
    container.innerHTML=''; const input=document.createElement('input'); input.placeholder='搜索国家...'; input.autocomplete='off'; if(selected) input.value=selected;
    const opts=document.createElement('div'); opts.className='options'; container.appendChild(input); container.appendChild(opts);
    function render(q=''){ const f=q.toLowerCase(); opts.innerHTML=countries.filter(c=>c.name.includes(f)).map(c=>`<div class="option" data-name="${c.name}">${c.name}</div>`).join(''); opts.querySelectorAll('.option').forEach(o=>o.onclick=()=>{input.value=o.dataset.name; opts.classList.remove('active');}); }
    input.addEventListener('focus',()=>{render(input.value); opts.classList.add('active');});
    input.addEventListener('input',()=>render(input.value));
    document.addEventListener('click',(e)=>{if(!container.contains(e.target)) opts.classList.remove('active');});
    render();
  }

  initAutocomplete('dashCustomer','dashCustomerList');
  initAutocomplete('filterCustomerName','custNameList');
  initAutocomplete('filterOrderCustomer','orderCustList');

  document.getElementById('filterCountry').addEventListener('change', renderCustomers);
  document.getElementById('filterStatus').addEventListener('change', renderCustomers);
  document.getElementById('filterProduct').addEventListener('change', renderCustomers);
  document.getElementById('filterDateFrom').addEventListener('change', renderCustomers);
  document.getElementById('filterDateTo').addEventListener('change', renderCustomers);
  document.getElementById('filterOrderCountry').addEventListener('change', renderOrders);
  document.getElementById('filterOrderProduct').addEventListener('change', renderOrders);
  document.getElementById('filterOrderStatus').addEventListener('change', renderOrders);
  document.getElementById('filterOrderDateFrom').addEventListener('change', renderOrders);
  document.getElementById('filterOrderDateTo').addEventListener('change', renderOrders);

  document.querySelectorAll('.nav-links a').forEach(a=>a.addEventListener('click',function(e){ document.querySelectorAll('.nav-links a').forEach(l=>l.classList.remove('active')); this.classList.add('active'); }));
  const sectionObserver = new IntersectionObserver((entries)=>{ entries.forEach(entry=>{ if(entry.isIntersecting){ document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active')); const link = document.querySelector(`.nav-links a[data-section="${entry.target.id}"]`); if(link) link.classList.add('active'); } }); }, { rootMargin: '-62px 0px -30% 0px', threshold: [0,0.1,0.2] });
  ['dashboard','customers','orders'].forEach(id=>{ const el=document.getElementById(id); if(el) sectionObserver.observe(el); });

  loadCustomData();
  loadFromStorage();
  refreshAll();
})();
</script>
